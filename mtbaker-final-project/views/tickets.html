<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonoMuse Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <script src="../static/script.js" defer></script>
  <script src="../static/tickets.js" defer></script>
</head>
<body>

<header>
  <div id="logo-text">MonoMuse</div>
  <nav class="navbar" id="myNavbar" aria-label="Main navigation">
    <a href="../index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="exhibitions.html">Exhibitions</a>
    <a href="tickets.html" id="navselected">Buy Tickets</a>
    <a href="membership.html">Membership</a>
    <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">☰</a>
  </nav>
</header>

<main class="main">
  <h1>Buy Tickets</h1>

  <table>
    <thead>
      <tr>
        <th>Ticket Type</th>
        <th>Description</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>General</td>
        <td>Standard admission to all exhibitions.</td>
        <td>$18</td>
      </tr>
      <tr>
        <td>Student</td>
        <td>Discounted admission with valid student ID.</td>
        <td>$12</td>
      </tr>
      <tr>
        <td>Member</td>
        <td>Free admission for MonoMuse members.</td>
        <td>$0</td>
      </tr>
    </tbody>
  </table>

  <form id="ticketForm" novalidate>
    <label for="visitDate">Visit Date <span>*</span></label>
    <input type="date" id="visitDate" required>

    <label for="ticketType">Ticket Type <span>*</span></label>
    <select id="ticketType" required>
      <option value="">Select ticket type</option>
      <option value="general">General</option>
      <option value="student">Student</option>
      <option value="member">Member</option>
    </select>
    <div id="ticketTypeError" class="error"></div>

    <label for="ticketQty">Quantity (1-10) <span>*</span></label>
    <input type="number" id="ticketQty" min="1" max="10" value="1" required>
    <div id="ticketQtyError" class="error"></div>

    <label for="email">Email <span>*</span></label>
    <input type="email" id="email" placeholder="you@example.com" required>
    <div id="emailError" class="error"></div>

    <label for="zip">Zip Code (optional)</label>
    <input type="text" id="zip" pattern="\d{5}" placeholder="12345">
    <div id="zipError" class="error"></div>

    <label>
      <input type="checkbox" id="mailingList"> Join our mailing list
    </label>

    <p>Total Price: $<span id="totalPrice">18.00</span></p>
    <button type="submit" class="cta">Place Order</button>
  </form>
</main>

<footer>
  <p>© <span id="copyYear"></span> MonoMuse</p>
</footer>

</body>
</html>
